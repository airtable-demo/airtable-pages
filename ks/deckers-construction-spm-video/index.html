<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deckers Brands × Airtable — Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0c1413; --accent:#2F474C; --accent2:#3d5d63; --text:#eef2f1; --muted:rgba(238,242,241,.62); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(61,93,99,.28),transparent 60%),var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5vw}
  .wrap{width:100%;max-width:880px;text-align:center}
  .chip{display:inline-block;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid rgba(238,242,241,.18);border-radius:999px;padding:6px 14px;margin-bottom:22px}
  h1{font-size:clamp(1.5rem,3.4vw,2.3rem);font-weight:700;line-height:1.15;margin-bottom:10px}
  p.sub{color:var(--muted);font-size:1.02rem;max-width:620px;margin:0 auto 28px}
  video{width:100%;border-radius:14px;border:1px solid rgba(238,242,241,.12);background:#000;box-shadow:0 18px 50px rgba(0,0,0,.5);display:block}
  .cta{margin-top:30px}
  .cta a{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;font-size:1rem;padding:14px 34px;border-radius:10px;border:1px solid var(--accent2);transition:transform .2s ease,background .2s ease}
  .cta a:hover{transform:translateY(-2px);background:var(--accent2)}
  .foot{margin-top:26px;font-size:.82rem;color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <span class="chip">Deckers Brands × Airtable</span>
    <h1>From store buildouts to strategic portfolio, one live view</h1>
    <p class="sub">A short overview of what a connected operating model looks like for your construction and strategic portfolio teams.</p>
    <video controls playsinline preload="metadata" poster="poster.jpg">
      <source src="video.mp4" type="video/mp4">
      Your browser does not support embedded video. <a href="video.mp4" style="color:#9fd0d6">Open the video.</a>
    </video>
    <div class="cta"><a href="https://meet.airtable.com/c/Kristen_Skundrick" target="_blank" rel="noopener noreferrer">Book 20 minutes</a></div>
    <div class="foot">Prepared for Deckers Brands by Kristen Skundrick</div>
  </div>
</body>
</html>
